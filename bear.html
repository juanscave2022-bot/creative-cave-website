<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreativeCave — Where Ideas Come Alive</title>
<meta name="description" content="CreativeCave. AI-forward media production and creative advertising studio. Orlando, Tampa, St. Petersburg.">
<meta name="theme-color" content="#0a0a0a">
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root {
  --c-bg:        #0a0a0a;
  --c-surface:   #111111;
  --c-border:    #1a1a1a;
  --c-text:      #e8e6e1;
  --c-text-dim:  #8a8880;
  --c-text-mute: #4a4840;
  --c-accent:    #1DA1F2;
  --c-accent-dim:rgba(29,161,242,.15);
  --c-accent-glow:rgba(29,161,242,.10);

  /* Type — SF Pro Display */
  --ff: 'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;

  /* Scale (major-third) */
  --fs-xs:   clamp(.6875rem, .65rem + .2vw, .75rem);
  --fs-sm:   clamp(.8125rem, .78rem + .2vw, .875rem);
  --fs-base: clamp(.9375rem, .9rem + .2vw, 1rem);
  --fs-md:   clamp(1.0625rem, 1rem + .3vw, 1.125rem);
  --fs-lg:   clamp(1.25rem, 1rem + 1vw, 1.75rem);
  --fs-xl:   clamp(2rem, 1.2rem + 3.5vw, 3.5rem);
  --fs-hero: clamp(2.5rem, 1.5rem + 4.5vw, 4.5rem);

  --ease-out: cubic-bezier(.16,1,.3,1);
  --dur-fast: .2s;
  --dur-med:  .5s;
}

/* ============================================================
   RESET
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{
  font-family:var(--ff);
  font-size:var(--fs-base);
  line-height:1.6;
  color:var(--c-text);
  background:var(--c-bg);
  overflow-x:hidden;
  min-height:100vh;
}
a{color:inherit;text-decoration:none}
ul{list-style:none}

/* ============================================================
   GRAIN OVERLAY
   ============================================================ */
body::before{
  content:'';
  position:fixed;
  inset:0;
  z-index:9999;
  pointer-events:none;
  opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;
}

/* ============================================================
   VIGNETTE
   ============================================================ */
body::after{
  content:'';
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 50% 50%, transparent 40%, rgba(0,0,0,.6) 100%);
}

/* ============================================================
   NAV
   ============================================================ */
.nav{
  position:fixed;
  top:0;left:0;right:0;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:1.25rem clamp(1.5rem,4vw,3rem);
  background:rgba(10,10,10,.6);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--c-border);
}
.nav__brand{
  font-size:var(--fs-md);
  font-weight:800;
  letter-spacing:-.02em;
  white-space:nowrap;
}
.nav__links{
  display:flex;
  gap:clamp(1rem,2.5vw,2.5rem);
  font-size:var(--fs-sm);
  color:var(--c-text-dim);
  font-weight:500;
}
.nav__links a{transition:color var(--dur-fast) ease}
.nav__links a:hover{color:var(--c-text)}
.nav__cta{
  font-size:var(--fs-sm);
  font-weight:600;
  padding:.5rem 1.25rem;
  border-radius:999px;
  border:1px solid var(--c-border);
  background:var(--c-surface);
  color:var(--c-text);
  cursor:pointer;
  transition:border-color var(--dur-fast) ease, background var(--dur-fast) ease;
  white-space:nowrap;
}
.nav__cta:hover{
  border-color:var(--c-accent);
  background:var(--c-accent-dim);
}
.nav__cta:focus-visible{outline:2px solid var(--c-accent);outline-offset:2px}

/* Hide nav links on small screens */
@media(max-width:700px){
  .nav__links{display:none}
}

/* ============================================================
   HERO
   ============================================================ */
.hero{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:calc(80px + 2rem) 1.5rem 3rem;
  text-align:center;
  overflow:hidden;
}

/* ============================================================
   BEAR CONTAINER
   ============================================================ */
.bear-wrap{
  position:relative;
  width:clamp(220px,35vw,400px);
  height:clamp(220px,35vw,400px);
  margin-bottom:clamp(1.5rem,3vw,2.5rem);
  /* Perspective for 3D tilt */
  perspective:800px;
}

/* Glow halo behind the bear */
.bear-glow{
  position:absolute;
  bottom:-10%;
  left:50%;
  width:120%;
  height:80%;
  transform:translateX(-50%);
  border-radius:50%;
  background:radial-gradient(ellipse at 50% 80%, var(--c-accent-glow) 0%, rgba(29,161,242,.04) 40%, transparent 70%);
  filter:blur(40px);
  pointer-events:none;
  transition:transform .1s linear;
  will-change:transform;
}

/* The bear image */
.bear{
  position:relative;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  will-change:transform;
  transform-style:preserve-3d;
}
.bear img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 20px 60px rgba(0,0,0,.5));
}

/* ============================================================
   HEADLINE
   ============================================================ */
.hero__headline{
  font-size:var(--fs-hero);
  font-weight:800;
  line-height:1.08;
  letter-spacing:-.03em;
  max-width:800px;
  margin-bottom:1rem;
  opacity:0;
  transform:translateY(24px);
  animation:fadeUp .8s var(--ease-out) .3s forwards;
}
.hero__headline .accent{
  color:var(--c-accent);
}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0)}
}

.hero__sub{
  font-size:var(--fs-md);
  color:var(--c-text-dim);
  max-width:560px;
  line-height:1.5;
  margin-bottom:2rem;
  font-weight:400;
  opacity:0;
  transform:translateY(16px);
  animation:fadeUp .8s var(--ease-out) .5s forwards;
}

/* CTA pill */
.hero__cta{
  display:inline-flex;
  align-items:center;
  gap:.5rem;
  font-size:var(--fs-base);
  font-weight:700;
  padding:.875rem 2rem;
  border-radius:999px;
  background:var(--c-accent);
  color:var(--c-bg);
  border:none;
  cursor:pointer;
  letter-spacing:.02em;
  transition:background var(--dur-fast) ease, transform var(--dur-fast) var(--ease-out);
  opacity:0;
  transform:translateY(16px);
  animation:fadeUp .8s var(--ease-out) .7s forwards;
}
.hero__cta:hover{background:#4db5f5;transform:scale(1.03)}
.hero__cta:active{transform:scale(.98)}
.hero__cta:focus-visible{outline:2px solid var(--c-accent);outline-offset:3px}

/* ============================================================
   REDUCED MOTION
   ============================================================ */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.01ms!important;
    animation-iteration-count:1!important;
    transition-duration:.01ms!important;
  }
  .bear,.bear-glow{transform:none!important}
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media(max-width:600px){
  .bear-wrap{
    width:200px;
    height:200px;
    margin-bottom:1.5rem;
  }
  .hero{padding-top:calc(60px + 2rem)}
  .nav{padding:1rem}
}
</style>
</head>
<body>

<!-- ====== NAV ====== -->
<nav class="nav" role="navigation" aria-label="Main navigation">
  <div class="nav__brand">CreativeCave</div>
  <ul class="nav__links">
    <li><a href="#services">Services</a></li>
    <li><a href="#work">Work</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <button class="nav__cta">Get Started</button>
</nav>

<!-- ====== HERO ====== -->
<section class="hero" aria-label="Hero">

  <!-- Bear with tracking wrapper -->
  <div class="bear-wrap" id="bearWrap">
    <div class="bear-glow" id="bearGlow"></div>
    <div class="bear" id="bear">
      <img src="bear.png" alt="CreativeCave bear mascot" width="400" height="400">
    </div>
  </div>

  <h1 class="hero__headline">
    Where Ideas Come Alive<br><span class="accent">— CreativeCave.</span>
  </h1>
  <p class="hero__sub">
    AI-powered media production and creative advertising that over-delivers — seamless, scalable, and unmistakably premium.
  </p>
  <button class="hero__cta">See What We Do</button>

</section>

<script>
(function(){
  'use strict';

  /* ===========================================================
     TRACKING CONFIG — tune these values
     =========================================================== */
  var CONFIG = {
    maxTiltX:   12,      /* max rotateX degrees (vertical look) */
    maxTiltY:   15,      /* max rotateY degrees (horizontal look) */
    parallax:   20,      /* max px the head shifts toward cursor */
    glowShift:  30,      /* max px the glow shifts toward cursor */
    lerp:       0.08,    /* interpolation factor (0–1, lower = smoother) */
    idleBob:    6,       /* idle float amplitude in px */
    idleSpeed:  3000     /* idle bob cycle ms */
  };

  var bear     = document.getElementById('bear');
  var glow     = document.getElementById('bearGlow');
  var wrap     = document.getElementById('bearWrap');

  /* Current interpolated values */
  var cx = 0, cy = 0;        /* current */
  var tx = 0, ty = 0;        /* target  */
  var mouseActive = false;
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  if (prefersReduced) return; /* static bear, no tracking */

  /* ===========================================================
     MOUSE TRACKING
     =========================================================== */
  function onPointerMove(e) {
    mouseActive = true;
    /* Normalize to -1..1 relative to viewport center */
    tx = (e.clientX / window.innerWidth  - 0.5) * 2;
    ty = (e.clientY / window.innerHeight - 0.5) * 2;
  }

  document.addEventListener('mousemove', onPointerMove, { passive: true });
  document.addEventListener('touchmove', function(e) {
    if (e.touches.length) {
      onPointerMove(e.touches[0]);
    }
  }, { passive: true });

  document.addEventListener('mouseleave', function() {
    mouseActive = false;
    tx = 0; ty = 0;
  });

  /* ===========================================================
     DEVICE ORIENTATION (mobile fallback)
     =========================================================== */
  if ('DeviceOrientationEvent' in window) {
    window.addEventListener('deviceorientation', function(e) {
      if (!mouseActive && e.gamma !== null && e.beta !== null) {
        tx = Math.max(-1, Math.min(1, (e.gamma || 0) / 30));
        ty = Math.max(-1, Math.min(1, ((e.beta || 0) - 45) / 30));
      }
    }, { passive: true });
  }

  /* ===========================================================
     ANIMATION LOOP
     =========================================================== */
  var idlePhase = 0;
  var lastTime  = performance.now();

  function tick(now) {
    var dt = (now - lastTime) / 16.67; /* normalize to ~60fps */
    lastTime = now;
    var lf = 1 - Math.pow(1 - CONFIG.lerp, dt);

    /* Lerp toward target */
    cx += (tx - cx) * lf;
    cy += (ty - cy) * lf;

    /* Idle bob when cursor isn't active */
    var bobY = 0, bobScale = 1;
    if (!mouseActive) {
      idlePhase += (now * 0.001 * (2 * Math.PI / (CONFIG.idleSpeed / 1000))) * 0.001;
      bobY = Math.sin(now / CONFIG.idleSpeed * Math.PI * 2) * CONFIG.idleBob;
      bobScale = 1 + Math.sin(now / CONFIG.idleSpeed * Math.PI * 2 + 1) * 0.008;
    }

    /* Compute transforms */
    var rotY =  cx * CONFIG.maxTiltY;
    var rotX = -cy * CONFIG.maxTiltX;
    var moveX = cx * CONFIG.parallax;
    var moveY = cy * CONFIG.parallax + bobY;

    bear.style.transform =
      'translate3d(' + moveX.toFixed(2) + 'px,' + moveY.toFixed(2) + 'px,0) ' +
      'rotateX(' + rotX.toFixed(2) + 'deg) ' +
      'rotateY(' + rotY.toFixed(2) + 'deg) ' +
      'scale(' + bobScale.toFixed(4) + ')';

    /* Glow follows with more exaggerated shift */
    var glowX = cx * CONFIG.glowShift;
    var glowY = cy * CONFIG.glowShift * 0.5;
    glow.style.transform =
      'translateX(calc(-50% + ' + glowX.toFixed(2) + 'px)) ' +
      'translateY(' + glowY.toFixed(2) + 'px)';

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

})();
</script>

</body>
</html>
